<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图标生成器</title>
  <style>
    body { background: #f0f0f0; font-family: sans-serif; padding: 40px; text-align: center; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    a { display: inline-block; margin: 10px; padding: 10px 20px; background: #1a1a2e; color: #fff; text-decoration: none; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>插件图标生成器</h2>
  <p>点击下方按钮下载对应尺寸的图标</p>
  <div id="canvases"></div>
  <script>
    const sizes = [16, 48, 128];
    sizes.forEach(size => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 背景
      const r = size * 0.18;
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.fill();

      // 文字 B64
      ctx.fillStyle = '#e94560';
      ctx.font = `bold ${size * 0.38}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('B64', size / 2, size / 2 + 1);

      document.getElementById('canvases').appendChild(canvas);

      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.textContent = `下载 icon${size}.png`;
      document.getElementById('canvases').appendChild(link);
    });
  </script>
</body>
</html>
